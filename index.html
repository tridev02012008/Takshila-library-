<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takshila Smart Library</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .stats {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #34495e;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 15px;
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .seat {
            aspect-ratio: 1;
            background-color: #2ecc71;
            color: white;
            display: flex;
            flex-direction: column;
            justify-center: center;
            align-items: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            font-size: 14px;
            justify-content: center;
        }
        .seat:hover {
            transform: scale(1.05);
        }
        .seat.occupied {
            background-color: #e74c3c;
        }
        .seat-name {
            font-size: 10px;
            font-weight: normal;
            margin-top: 4px;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .modal-content input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save { background-color: #2ecc71; color: white; }
        .btn-clear { background-color: #e74c3c; color: white; }
        .btn-cancel { background-color: #95a5a6; color: white; }
    </style>
</head>
<body>

    <h1>Takshila Smart Library</h1>
    <div class="stats">Total Seats: 89 | Occupied: <span id="occupied-count">0</span></div>

    <div class="grid-container" id="seats-grid"></div>

    <!-- Student Detail Modal -->
    <div class="modal" id="student-modal">
        <div class="modal-content">
            <h3 id="modal-title">Seat Details</h3>
            <input type="text" id="student-name" placeholder="Student Name">
            <input type="tel" id="student-phone" placeholder="Phone Number">
            <div class="btn-group">
                <button class="btn btn-save" onclick="saveSeat()">Save</button>
                <button class="btn btn-clear" onclick="clearSeat()">Vacant</button>
                <button class="btn btn-cancel" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_SEATS = 89;
        let libraryData = JSON.parse(localStorage.getItem('takshila_library_data')) || {};
        let currentSeatNumber = null;

        const gridContainer = document.getElementById('seats-grid');

        // Generate 89 Seats
        function renderSeats() {
            gridContainer.innerHTML = '';
            let occupiedCount = 0;

            for (let i = 1; i <= TOTAL_SEATS; i++) {
                const seat = document.createElement('div');
                seat.classList.add('seat');
                seat.innerText = i;

                if (libraryData[i]) {
                    seat.classList.add('occupied');
                    occupiedCount++;
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.classList.add('seat-name');
                    nameSpan.innerText = libraryData[i].name;
                    seat.appendChild(nameSpan);
                }

                seat.onclick = () => openModal(i);
                gridContainer.appendChild(seat);
            }

            document.getElementById('occupied-count').innerText = occupiedCount;
        }

        function openModal(seatNum) {
            currentSeatNumber = seatNum;
            document.getElementById('modal-title').innerText = `Seat Number ${seatNum}`;
            
            if (libraryData[seatNum]) {
                document.getElementById('student-name').value = libraryData[seatNum].name;
                document.getElementById('student-phone').value = libraryData[seatNum].phone;
            } else {
                document.getElementById('student-name').value = '';
                document.getElementById('student-phone').value = '';
            }
            
            document.getElementById('student-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('student-modal').style.display = 'none';
        }

        function saveSeat() {
            const name = document.getElementById('student-name').value.trim();
            const phone = document.getElementById('student-phone').value.trim();

            if (name === "") {
                alert("Please enter student name");
                return;
            }

            libraryData[currentSeatNumber] = { name, phone };
            localStorage.setItem('takshila_library_data', JSON.stringify(libraryData));
            closeModal();
            renderSeats();
        }

        function clearSeat() {
            if (libraryData[currentSeatNumber]) {
                delete libraryData[currentSeatNumber];
                localStorage.setItem('takshila_library_data', JSON.stringify(libraryData));
            }
            closeModal();
            renderSeats();
        }

        // Initial Render
        renderSeats();
    </script>
</body>
</html>
